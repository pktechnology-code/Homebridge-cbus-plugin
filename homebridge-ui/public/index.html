<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>C-Bus Discovery Picker</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
  >
</head>

<body class="p-3">

<div class="card">

  <div class="card-header">
    <strong>C-Bus Discovery Picker</strong>
  </div>

  <div class="card-body">

    <p class="text-muted">
      Load discovered C-Bus groups, choose which accessories to expose to HomeKit,
      then save the selection safely into the plugin configuration.
    </p>

    <div class="mb-3">
      <button id="loadBtn" class="btn btn-primary">
        Load Discovery Cache
      </button>

      <button id="selectAllBtn" class="btn btn-secondary">
        Select All
      </button>

      <button id="selectNoneBtn" class="btn btn-secondary">
        Select None
      </button>

      <button id="saveBtn" class="btn btn-success">
        Save Selected Accessories
      </button>
    </div>

    <div id="status" class="alert alert-info">
      Ready
    </div>

    <div class="table-responsive">

      <table class="table table-striped table-sm align-middle">

        <thead>
          <tr>
            <th style="width:90px;">Enabled</th>
            <th style="width:80px;">ID</th>
            <th>Name</th>
            <th style="width:180px;">Type</th>
            <th style="width:180px;">Active Duration</th>
          </tr>
        </thead>

        <tbody id="groupsTable">
          <tr>
            <td colspan="5" class="text-muted">
              Click “Load Discovery Cache”.
            </td>
          </tr>
        </tbody>

      </table>

    </div>

  </div>

</div>

<script>

(async () => {

  const TYPES = [
    'light',
    'dimmer',
    'switch',
    'fan',
    'motion',
    'security',
    'shutter',
    'trigger',
    'smoke',
    'contact',
    'temperature'
  ];

  let groups = [];

  let pluginConfigArray = [];

  let platformConfig = null;

  function setStatus(message, type = 'info') {

    const status = document.getElementById('status');

    status.className = `alert alert-${type}`;

    status.innerText = message;
  }

  function escapeHtml(value) {

    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  async function loadPluginConfig() {

    pluginConfigArray = await homebridge.getPluginConfig();

    if (!Array.isArray(pluginConfigArray)) {
      pluginConfigArray = [];
    }

    if (pluginConfigArray.length === 0) {

      platformConfig = {
        platform: 'CBus',
        name: 'Clipsal C-Gate',
        client_ip_address: '127.0.0.1',
        client_controlport: 20023,
        client_cbusname: 'OGILVY',
        client_network: 254,
        client_application: 56,
        client_debug: false,
        autoDiscover: true,
        discoveryDefaultType: 'light',
        discoveryCacheEnabled: true,
        discoveryCachePath: '/volume1/DATA1/cbus-discovery-cache.json',
        discoveredAccessories: [],
        accessories: []
      };

      pluginConfigArray = [platformConfig];

      return;
    }

    platformConfig = pluginConfigArray[0];

    if (!platformConfig.discoveredAccessories) {
      platformConfig.discoveredAccessories = [];
    }

    if (!platformConfig.accessories) {
      platformConfig.accessories = [];
    }
  }

  function getSelectionsMap() {

    const map = new Map();

    if (!platformConfig.discoveredAccessories) {
      return map;
    }

    for (const item of platformConfig.discoveredAccessories) {

      if (!item || typeof item.id === 'undefined') {
        continue;
      }

      map.set(String(item.id), item);
    }

    return map;
  }

  async function loadDiscoveryCache() {

    try {

      homebridge.showSpinner();

      setStatus('Loading discovery cache...');

      await loadPluginConfig();

      const result = await homebridge.request(
        '/read-discovery-cache',
        {
          discoveryCachePath: platformConfig.discoveryCachePath
        }
      );

      groups = Array.isArray(result.cache.groups)
        ? result.cache.groups
        : [];

      render();

      setStatus(
        `Loaded ${groups.length} discovered C-Bus groups`,
        'success'
      );

      homebridge.toast.success(
        `Loaded ${groups.length} discovered groups`,
        'C-Bus'
      );

    } catch (err) {

      console.error(err);

      setStatus(err.message || String(err), 'danger');

      homebridge.toast.error(
        err.message || String(err),
        'Discovery Cache'
      );

    } finally {

      homebridge.hideSpinner();
    }
  }

  function render() {

    const tbody = document.getElementById('groupsTable');

    const selections = getSelectionsMap();

    tbody.innerHTML = '';

    for (const group of groups) {

      const id = String(group.id);

      const existing = selections.get(id);

      const enabled = existing
        ? existing.enabled !== false
        : false;

      const type = existing?.type
        || platformConfig.discoveryDefaultType
        || 'light';

      const name = existing?.name
        || group.name
        || `C-Bus Group ${id}`;

      const activeDuration = existing?.activeDuration || '';

      const typeOptions = TYPES.map(typeName => {

        const selected = typeName === type
          ? 'selected'
          : '';

        return `
          <option value="${typeName}" ${selected}>
            ${typeName}
          </option>
        `;

      }).join('');

      const row = document.createElement('tr');

      row.dataset.id = id;

      row.innerHTML = `
        <td>
          <input
            type="checkbox"
            class="form-check-input enabled"
            ${enabled ? 'checked' : ''}
          >
        </td>

        <td>
          <code>${escapeHtml(id)}</code>
        </td>

        <td>
          <input
            type="text"
            class="form-control form-control-sm name"
            value="${escapeHtml(name)}"
          >
        </td>

        <td>
          <select class="form-select form-select-sm type">
            ${typeOptions}
          </select>
        </td>

        <td>
          <input
            type="text"
            class="form-control form-control-sm activeDuration"
            placeholder="e.g. 1 sec"
            value="${escapeHtml(activeDuration)}"
          >
        </td>
      `;

      tbody.appendChild(row);
    }
  }

  function buildSelectedAccessories() {

    const rows = Array.from(
      document.querySelectorAll('#groupsTable tr[data-id]')
    );

    const selected = [];

    for (const row of rows) {

      const enabled = row.querySelector('.enabled').checked;

      if (!enabled) {
        continue;
      }

      const id = row.dataset.id;

      const name = row.querySelector('.name').value.trim();

      const type = row.querySelector('.type').value;

      const activeDuration = row.querySelector('.activeDuration')
        .value
        .trim();

      const item = {
        enabled: true,
        id,
        name,
        type
      };

      if (activeDuration) {
        item.activeDuration = activeDuration;
      }

      selected.push(item);
    }

    return selected;
  }

  async function saveSelectedAccessories() {

    try {

      homebridge.showSpinner();

      setStatus('Saving selected accessories...');

      await loadPluginConfig();

      const selectedAccessories = buildSelectedAccessories();

      const mergedConfig = {
        ...platformConfig,
        discoveredAccessories: selectedAccessories
      };

      pluginConfigArray[0] = mergedConfig;

      await homebridge.updatePluginConfig(pluginConfigArray);

      await homebridge.savePluginConfig();

      setStatus(
        `Saved ${selectedAccessories.length} accessories successfully`,
        'success'
      );

      homebridge.toast.success(
        `Saved ${selectedAccessories.length} accessories`,
        'C-Bus'
      );

    } catch (err) {

      console.error(err);

      setStatus(err.message || String(err), 'danger');

      homebridge.toast.error(
        err.message || String(err),
        'Save Failed'
      );

    } finally {

      homebridge.hideSpinner();
    }
  }

  document
    .getElementById('loadBtn')
    .addEventListener('click', loadDiscoveryCache);

  document
    .getElementById('saveBtn')
    .addEventListener('click', saveSelectedAccessories);

  document
    .getElementById('selectAllBtn')
    .addEventListener('click', () => {

      document
        .querySelectorAll('.enabled')
        .forEach(el => {
          el.checked = true;
        });
    });

  document
    .getElementById('selectNoneBtn')
    .addEventListener('click', () => {

      document
        .querySelectorAll('.enabled')
        .forEach(el => {
          el.checked = false;
        });
    });

  await loadPluginConfig();

})();
</script>

</body>
</html>
