<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>C-Bus Discovery Picker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="p-3">

<div class="card">
  <div class="card-header">
    <strong>C-Bus Discovery Picker</strong>
  </div>

  <div class="card-body">

    <div class="mb-3">
      <button id="loadCacheBtn" class="btn btn-primary">Load Discovery Cache</button>
      <button id="selectAllBtn" class="btn btn-secondary">Select All</button>
      <button id="selectNoneBtn" class="btn btn-secondary">Select None</button>
      <button id="saveBtn" class="btn btn-success">Save Selected Accessories</button>
    </div>

    <div id="status" class="alert alert-info">
      Ready
    </div>

    <table class="table table-striped">
      <thead>
        <tr>
          <th>Enabled</th>
          <th>ID</th>
          <th>Name</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="groupsTable">
      </tbody>
    </table>

  </div>
</div>

<script>
(async () => {

  const TYPES = [
    'light',
    'dimmer',
    'switch',
    'fan',
    'motion',
    'security',
    'shutter',
    'trigger',
    'smoke',
    'contact',
    'temperature'
  ];

  let groups = [];
  let pluginConfig = [];

  async function loadPluginConfig() {
    pluginConfig = await homebridge.getPluginConfig();

    if (!pluginConfig.length) {
      pluginConfig = [{
        platform: 'CBus',
        name: 'Clipsal C-Gate'
      }];
    }

    return pluginConfig[0];
  }

  async function loadDiscoveryCache() {

    document.getElementById('status').innerText = 'Loading discovery cache...';

    const config = await loadPluginConfig();

    const result = await homebridge.request('/read-discovery-cache', {
      discoveryCachePath: config.discoveryCachePath
    });

    groups = result.cache.groups || [];

    render();

    document.getElementById('status').innerText =
      `Loaded ${groups.length} discovered C-Bus groups`;
  }

  function render() {

    const tbody = document.getElementById('groupsTable');

    tbody.innerHTML = '';

    groups.forEach(group => {

      const tr = document.createElement('tr');

      const typeOptions = TYPES.map(type =>
        `<option value="${type}" ${type === (group.suggestedType || 'light') ? 'selected' : ''}>${type}</option>`
      ).join('');

      tr.innerHTML = `
        <td><input type="checkbox" class="enabled" checked></td>
        <td>${group.id}</td>
        <td><input type="text" class="form-control name" value="${group.name}"></td>
        <td>
          <select class="form-select type">
            ${typeOptions}
          </select>
        </td>
      `;

      tbody.appendChild(tr);
    });
  }

  async function save() {

    const config = await loadPluginConfig();

    const rows = document.querySelectorAll('#groupsTable tr');

    const discoveredAccessories = [];

    rows.forEach(row => {

      const enabled = row.querySelector('.enabled').checked;

      if (!enabled) {
        return;
      }

      const id = row.children[1].innerText.trim();

      const name = row.querySelector('.name').value.trim();

      const type = row.querySelector('.type').value;

      discoveredAccessories.push({
        enabled: true,
        id,
        name,
        type
      });
    });

    config.discoveredAccessories = discoveredAccessories;

    await homebridge.updatePluginConfig(pluginConfig);
    await homebridge.savePluginConfig();

    homebridge.toast.success(
      `Saved ${discoveredAccessories.length} accessories`,
      'C-Bus'
    );
  }

  document.getElementById('loadCacheBtn')
    .addEventListener('click', loadDiscoveryCache);

  document.getElementById('saveBtn')
    .addEventListener('click', save);

  document.getElementById('selectAllBtn')
    .addEventListener('click', () => {
      document.querySelectorAll('.enabled')
        .forEach(el => el.checked = true);
    });

  document.getElementById('selectNoneBtn')
    .addEventListener('click', () => {
      document.querySelectorAll('.enabled')
        .forEach(el => el.checked = false);
    });

})();
</script>

</body>
</html>
